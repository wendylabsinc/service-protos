syntax = "proto3";

package wendycloud.v1;

import "google/protobuf/timestamp.proto";

service DeploymentService {
  // ==================== App Releases ====================
  rpc CreateAppRelease(CreateAppReleaseRequest) returns (AppRelease);
  rpc UpdateAppRelease(UpdateAppReleaseRequest) returns (AppRelease);
  rpc ListAppReleases(ListAppReleasesRequest) returns (stream ListAppReleasesResponse);
  rpc GetPushImageCredentials(GetPushImageCredentialsRequest) returns (GetPushImageCredentialsResponse);


  // ==================== Deployments ====================
  rpc CreateDeployment(CreateDeploymentRequest) returns (Deployment);
  rpc GetDeployment(GetDeploymentRequest) returns (Deployment);
  rpc ListDeployments(ListDeploymentsRequest) returns (stream ListDeploymentsResponse);

  // ==================== Asset App Desired Instructions (wendy-agent) ====================
  rpc HandleReportedState(stream UpdateReportedStateRequest) returns (stream DesiredStateResponse);
  rpc ListAssetApps(ListAssetAppsRequest) returns (ListAssetAppsResponse);
  rpc GetPullCredentials(GetPullCredentialsRequest) returns (GetPullCredentialsResponse);

  // ==================== Device Container Control ====================
  rpc ListDeviceContainers(ListDeviceContainersRequest) returns (stream DeviceContainer);
  rpc ControlContainer(ControlContainerRequest) returns (ControlContainerResponse);

  // ==================== Operator-signed hash-chained postbox (AAA v0.6 section 5.3, D8/D9) ====================
  // SubmitChangeRequest is the operator-facing accept-gate: cloud verifies the operator
  // certificate's validity-at-signing and the caller's live authorization, timestamps the
  // request via the pki-core RFC 3161 Time-Stamping Authority (TSA), then appends one
  // append-only, hash-chained row per target. It replaces the unsigned desired-state write.
  rpc SubmitChangeRequest(SubmitChangeRequestRequest) returns (SubmitChangeRequestResponse);
  // PollChanges is device-facing (device mTLS identity): it returns the contiguous chain of
  // postbox entries with id greater than since_id for the caller's (tenant, target) chain.
  rpc PollChanges(PollChangesRequest) returns (PollChangesResponse);
  // GetHeadCheckpoint returns the latest pki-core-signed head checkpoint for a (tenant, target)
  // chain so a device can bound its high-water mark without walking every entry.
  rpc GetHeadCheckpoint(GetHeadCheckpointRequest) returns (GetHeadCheckpointResponse);
}

// ==================== App Releases ====================
message AppRelease {
  int32 id = 1;
  int32 organization_id = 2;
  string app_id = 3;
  string name = 4;
  string details = 5;
  optional string image_digest = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  ReleaseType release_type = 9;
}

message CreateAppReleaseRequest {
  string app_id = 1;
  int32 organization_id = 2;
  string name = 3;
  string details = 4;
  ReleaseType release_type = 5;
}

// Use this to assign a image_digest to an app_release after it has been pushed to the registry
// Note, verify that the image_digest exists in the registry before updating the app_release
message UpdateAppReleaseRequest {
  int32 id = 1;
  string name = 2;
  string details = 3;
  string image_digest = 4;
}

message ListAppReleasesRequest {
  int32 organization_id = 1;
  string app_id = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message ListAppReleasesResponse {
  repeated AppRelease app_releases = 1;
  int32 total = 2;
  int32 offset = 3;
}

message GetPushImageCredentialsRequest {
  int32 organization_id = 1;
  string app_id = 2;
}

message GetPushImageCredentialsResponse {
  string registry_url = 1;
  string full_image_path = 2;
  string access_token = 3;
  google.protobuf.Timestamp expires_at = 4;
  string username = 5;
}

// ==================== Deployments ====================

message Deployment {
  int32 id = 1;
  int32 organization_id = 2;
  string jq_filter = 3;
  int32 app_release_id = 4;
  string details = 5;
  string created_by_user_id = 6;
  google.protobuf.Timestamp created_at = 7;
}

// infer the created_by_user_id from the authService
message CreateDeploymentRequest {
  int32 organization_id = 1;
  optional string jq_filter = 2;
  int32 app_release_id = 3;
  string details = 4;
  Running running = 5;
} 

message GetDeploymentRequest {
  int32 id = 1;
}

message ListDeploymentsRequest {
  int32 organization_id = 1;
  string app_id = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message ListDeploymentsResponse {
  repeated Deployment deployments = 1;
  int32 total = 2;
}

// ==================== Asset App Desired Instructions (wendy-agent) ====================

// this is to be called by the wendy-agent to update the reported state of an apps on an asset
// asset_id and organization_id are derived from the client certificate
message UpdateReportedStateRequest {
  repeated CurrentState current_states = 1;
}

message CurrentState {
  string app_id = 1;
  optional int32 app_release_id = 2;
  Running reported_state = 3;
  int32 reported_restart_count = 4;
  uint32 reported_last_exit_signal = 5;
}

// this is to be called by the wendy-agent to get the desired state of an app on an asset
// if the app_id does not exist, wendy-agent should remove the container from the asset
message DesiredStateResponse {
  repeated DesiredAppState desired_app_states = 1;
  optional google.protobuf.Timestamp cert_expires_at = 2;
}

message DesiredAppState {
  string app_id = 1;
  optional int32 app_release_id = 2;
  Running desired_state = 3;
  optional string image_digest = 4;
  ReleaseType release_type = 5;
}

enum Running {
  ABSENT = 0;
  RUNNING = 1;
  STOPPED = 2;
}

enum ReleaseType {
  CONTAINER = 0;
  WASM = 1;
}

// ==================== List Asset Apps ====================
message ListAssetAppsRequest {
  int32 asset_id = 1;
  int32 organization_id = 2;
}

message AssetApp {
  string app_id = 1;
  string app_name = 2;
  optional int32 app_release_id = 3;
  optional string app_release_name = 4;
  Running desired_state = 5;
  optional Running reported_state = 6;
  optional google.protobuf.Timestamp reported_at = 7;
  optional int32 reported_restart_count = 8;
  // Convenience: most recent deployment that targeted this app release in the org
  optional int32 deployment_id = 9;
  optional string deployment_details = 10;
  optional google.protobuf.Timestamp deployment_created_at = 11;
  ReleaseType release_type = 12;
}

message ListAssetAppsResponse {
  repeated AssetApp asset_apps = 1;
}

// ==================== Pull Credentials (wendy-agent / microcontrollers) ====================
message GetPullCredentialsRequest {
  int32 app_release_id = 1;
}

message GetPullCredentialsResponse {
  string registry_url = 1;
  string full_artifact_path = 2;
  string access_token = 3;
  google.protobuf.Timestamp expires_at = 4;
  string username = 5;
  ReleaseType release_type = 6;
}

// ==================== Device Container Control ====================

message ListDeviceContainersRequest {
  int32 asset_id = 1;
  int32 organization_id = 2;
}

message DeviceContainer {
  string app_name = 1;
  string app_version = 2;
  AppRunningState running_state = 3;
  uint32 failure_count = 4;
  repeated DeviceService services = 5;
}

message DeviceService {
  string name = 1;
  AppRunningState running_state = 2;
}

enum AppRunningState {
  APP_RUNNING_STATE_UNSPECIFIED = 0;
  APP_RUNNING_STATE_STOPPED = 1;
  APP_RUNNING_STATE_RUNNING = 2;
}

message ControlContainerRequest {
  int32 asset_id = 1;
  int32 organization_id = 2;
  // "myapp" for whole app; "myapp.web" for one service container
  string container_name = 3;
  ContainerAction action = 4;
}

enum ContainerAction {
  CONTAINER_ACTION_UNSPECIFIED = 0;
  CONTAINER_ACTION_START = 1;
  CONTAINER_ACTION_STOP = 2;
}

message ControlContainerResponse {
  optional string warning = 1;
}

// ==================== Operator-signed hash-chained postbox (AAA v0.6 section 5.3) ====================

// ChangeRequest is the operator-authored desired-state change. The operator serializes this
// message and signs the resulting bytes with the private key of its operator certificate; the
// signature and certificate travel in OperatorSignedChangeRequest. Cloud stores these exact
// signed bytes verbatim as the postbox entry payload so the signature stays verifiable by the
// device forever, independent of any future proto field additions.
message ChangeRequest {
  int32 tenant = 1;                   // organization id the change belongs to
  repeated string target_set = 2;     // targets the change applies to (asset ids as strings)
  string release_oci_digest = 3;      // pinned image digest the targets should converge to
  Running desired_state = 4;          // running / stopped / absent
  string app_id = 5;                  // app the change targets
  optional int32 app_release_id = 6;  // app release backing the digest, when known
  google.protobuf.Timestamp iat = 7;  // issued-at; the operator cert must be valid at this instant
  google.protobuf.Timestamp exp = 8;  // expiry; cloud rejects a request already expired at accept time
  string nonce = 9;                   // unique per request; device-side replay guard
}

// OperatorSignedChangeRequest binds a ChangeRequest to the operator identity that authored it.
message OperatorSignedChangeRequest {
  bytes change_request = 1;  // the serialized ChangeRequest bytes that were signed
  bytes operator_cert = 2;   // DER operator certificate whose key produced operator_sig
  bytes operator_sig = 3;    // ECDSA P-256 / SHA-256 signature (DER) over change_request
}

message SubmitChangeRequestRequest {
  OperatorSignedChangeRequest signed = 1;
}

message SubmitChangeRequestResponse {
  repeated PostboxEntry entries = 1;  // one appended entry per target in target_set
}

// PostboxEntry is one append-only, hash-chained row. The chain is per (tenant, target):
//   row_hash = SHA256(prior_hash || canonical(entry))
// where canonical(entry) is the length-prefixed concatenation, in field order, of
// tenant, target, payload, operator_sig and tsa_token. prior_hash is the row_hash of the
// preceding entry in the same (tenant, target) chain, or 32 zero bytes for the first entry.
message PostboxEntry {
  int64 id = 1;                        // monotonic, table-wide append order
  int32 tenant = 2;
  string target = 3;
  bytes payload = 4;                   // the operator-signed ChangeRequest bytes
  bytes operator_sig = 5;
  bytes tsa_token = 6;                 // RFC 3161 timestamp token from pki-core TSA
  bytes prior_hash = 7;
  bytes row_hash = 8;
  google.protobuf.Timestamp created_at = 9;
}

message PollChangesRequest {
  int32 tenant = 1;      // must match the device certificate org
  string target = 2;     // the polling device's target id
  int64 since_id = 3;    // high-water mark; entries with id > since_id are returned in order
  int32 limit = 4;       // 0 means server default
}

message PollChangesResponse {
  repeated PostboxEntry entries = 1;
}

message GetHeadCheckpointRequest {
  int32 tenant = 1;
  string target = 2;
}

// HeadCheckpoint is the signed high-water mark for a (tenant, target) chain.
message HeadCheckpoint {
  int32 tenant = 1;
  string target = 2;
  int64 max_id = 3;
  bytes hash_of_head = 4;              // row_hash of the entry at max_id (or 32 zero bytes if empty)
  google.protobuf.Timestamp time = 5;
}

// SignedHeadCheckpoint carries a HeadCheckpoint signed by pki-core.
message SignedHeadCheckpoint {
  bytes checkpoint = 1;   // the serialized HeadCheckpoint bytes that were signed
  bytes signature = 2;    // ECDSA P-256 / SHA-256 signature (DER) over checkpoint
  bytes signer_cert = 3;  // DER certificate of the pki-core checkpoint signer
}

message GetHeadCheckpointResponse {
  SignedHeadCheckpoint checkpoint = 1;
}
