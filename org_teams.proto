syntax = "proto3";

package wendycloud.v1;

import "google/protobuf/timestamp.proto";

// OrgTeamService manages Cloud-owned teams within an organization.
// Teams group organization members and carry free-form permission grants.
// Permission strings are org-defined (e.g. "registry:push", "assets:view");
// they are persisted only and not yet enforced anywhere.
//
// This service is intentionally separate from the hackathon TeamService and
// its teams/team_members tables. It is backed by the org_teams,
// org_team_members, and team_permissions tables. All message names carry the
// OrgTeam prefix because the hackathon teams.proto already occupies the
// unprefixed names in the wendycloud.v1 package.
service OrgTeamService {
  rpc CreateTeam(CreateOrgTeamRequest) returns (OrgTeam);
  rpc GetTeam(GetOrgTeamRequest) returns (OrgTeam);
  rpc UpdateTeam(UpdateOrgTeamRequest) returns (OrgTeam);
  rpc DeleteTeam(DeleteOrgTeamRequest) returns (DeleteOrgTeamResponse);
  rpc ListTeams(ListOrgTeamsRequest) returns (ListOrgTeamsResponse);

  rpc AddTeamMember(AddOrgTeamMemberRequest) returns (OrgTeamMember);
  rpc RemoveTeamMember(RemoveOrgTeamMemberRequest) returns (RemoveOrgTeamMemberResponse);
  rpc ListTeamMembers(ListOrgTeamMembersRequest) returns (ListOrgTeamMembersResponse);

  rpc GrantTeamPermission(GrantOrgTeamPermissionRequest) returns (OrgTeamPermission);
  rpc RevokeTeamPermission(RevokeOrgTeamPermissionRequest) returns (RevokeOrgTeamPermissionResponse);
  rpc ListTeamPermissions(ListOrgTeamPermissionsRequest) returns (ListOrgTeamPermissionsResponse);
}

message OrgTeam {
  int32 id = 1;
  int32 organization_id = 2;
  string name = 3;
  optional string description = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message OrgTeamMember {
  int32 id = 1;
  int32 team_id = 2;
  string user_id = 3;
  google.protobuf.Timestamp created_at = 4;
}

message OrgTeamPermission {
  int64 id = 1;
  int32 team_id = 2;
  string permission = 3;
  optional string granted_by = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateOrgTeamRequest {
  int32 organization_id = 1;
  string name = 2;
  optional string description = 3;
}

message GetOrgTeamRequest {
  int32 id = 1;
}

message UpdateOrgTeamRequest {
  int32 id = 1;
  string name = 2;
  optional string description = 3;
}

message DeleteOrgTeamRequest {
  int32 id = 1;
}

message DeleteOrgTeamResponse {
  bool success = 1;
}

message ListOrgTeamsRequest {
  int32 organization_id = 1;
}

message ListOrgTeamsResponse {
  repeated OrgTeam teams = 1;
}

message AddOrgTeamMemberRequest {
  int32 team_id = 1;
  string user_id = 2;
}

message RemoveOrgTeamMemberRequest {
  int32 team_id = 1;
  string user_id = 2;
}

message RemoveOrgTeamMemberResponse {
  bool success = 1;
}

message ListOrgTeamMembersRequest {
  int32 team_id = 1;
}

message ListOrgTeamMembersResponse {
  repeated OrgTeamMember members = 1;
}

message GrantOrgTeamPermissionRequest {
  int32 team_id = 1;
  string permission = 2;
}

message RevokeOrgTeamPermissionRequest {
  int32 team_id = 1;
  string permission = 2;
}

message RevokeOrgTeamPermissionResponse {
  bool success = 1;
}

message ListOrgTeamPermissionsRequest {
  int32 team_id = 1;
}

message ListOrgTeamPermissionsResponse {
  repeated OrgTeamPermission permissions = 1;
}
