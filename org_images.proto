syntax = "proto3";

package wendycloud.v1;

import "google/protobuf/timestamp.proto";

// OrgImageService is the management surface for GitHub-Packages-style registry
// images: first-class image records with transferable ownership and explicit
// per-image permissions. Authorization for pushes and pulls themselves happens
// in the Docker Registry version 2 token endpoint; this service manages the
// ownership and grant metadata that the endpoint reads.
//
// All message and enum names carry the OrgImage prefix because the hackathon
// protos already occupy unprefixed names such as Image, Owner, and Tag in the
// wendycloud.v1 package, mirroring the OrgTeamService (WDY-1858) convention.
service OrgImageService {
  // ListImages returns the images visible to the caller: images they own
  // (directly or via an owning organization), images granted to them, or
  // images they reach through an organization-role default.
  rpc ListImages(ListOrgImagesRequest) returns (ListOrgImagesResponse);
  // GetImage returns image metadata plus the tags and digests fetched live
  // from the Distribution HTTP API.
  rpc GetImage(GetOrgImageRequest) returns (GetOrgImageResponse);
  // CreateImage pre-registers a path; the caller becomes its owner.
  rpc CreateImage(CreateOrgImageRequest) returns (OrgImage);
  // TransferOwnership adds a new owner then removes the old one atomically,
  // refusing to remove the last owner.
  rpc TransferOwnership(TransferOrgImageOwnershipRequest) returns (OrgImage);
  // ListPermissions returns the explicit grants on an image.
  rpc ListPermissions(ListOrgImagePermissionsRequest) returns (ListOrgImagePermissionsResponse);
  // GrantPermission adds an explicit grant. Team grantees are stored by the
  // schema but rejected by the service until registry enforcement resolves
  // team grants against the Cloud org_teams / org_team_members tables
  // (WDY-1858).
  rpc GrantPermission(GrantOrgImagePermissionRequest) returns (OrgImagePermission);
  // RevokePermission removes a grant by id.
  rpc RevokePermission(RevokeOrgImagePermissionRequest) returns (RevokeOrgImagePermissionResponse);
  // DeleteImage deletes the image DB record (owners only). Blob deletion in the
  // registry itself is out of scope; blobs remain until garbage-collected by
  // the registry operator.
  rpc DeleteImage(DeleteOrgImageRequest) returns (DeleteOrgImageResponse);
}

// OrgImageOwnerType enumerates who can own an image.
enum OrgImageOwnerType {
  ORG_IMAGE_OWNER_TYPE_UNSPECIFIED = 0;
  ORG_IMAGE_OWNER_TYPE_USER = 1;
  ORG_IMAGE_OWNER_TYPE_ORGANIZATION = 2;
}

// OrgImageGranteeType enumerates who a permission can be granted to. TEAM
// grants are stored by the schema but rejected by the service until registry
// enforcement resolves team grants against the Cloud org_teams /
// org_team_members tables (WDY-1858).
enum OrgImageGranteeType {
  ORG_IMAGE_GRANTEE_TYPE_UNSPECIFIED = 0;
  ORG_IMAGE_GRANTEE_TYPE_USER = 1;
  ORG_IMAGE_GRANTEE_TYPE_ORGANIZATION = 2;
  ORG_IMAGE_GRANTEE_TYPE_ORG_ROLE = 3;
  ORG_IMAGE_GRANTEE_TYPE_TEAM = 4;
}

// OrgImagePermissionLevel is hierarchical: PUSH implies PULL implies VIEW.
enum OrgImagePermissionLevel {
  ORG_IMAGE_PERMISSION_LEVEL_UNSPECIFIED = 0;
  ORG_IMAGE_PERMISSION_LEVEL_VIEW = 1;
  ORG_IMAGE_PERMISSION_LEVEL_PULL = 2;
  ORG_IMAGE_PERMISSION_LEVEL_PUSH = 3;
}

message OrgImageOwner {
  OrgImageOwnerType type = 1;
  // For a user owner this is the user id; for an organization owner this is the
  // organization id rendered as a string.
  string id = 2;
}

message OrgImage {
  int64 id = 1;
  string name = 2;
  // Immutable repository path, for example org-7/api. Ownership transfers never
  // change the path.
  string path = 3;
  string description = 4;
  string created_by = 5;
  repeated OrgImageOwner owners = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message OrgImagePermission {
  int64 id = 1;
  int64 image_id = 2;
  OrgImageGranteeType grantee_type = 3;
  // For a user grantee this is the user id; for an organization grantee the
  // organization id as a string; for an org_role grantee the role name.
  string grantee_id = 4;
  // Required for org_role and team grantees; unset otherwise.
  optional int32 organization_id = 5;
  OrgImagePermissionLevel permission = 6;
  string granted_by = 7;
  google.protobuf.Timestamp created_at = 8;
}

message OrgImageTag {
  string name = 1;
  string digest = 2;
  int64 size_bytes = 3;
}

message ListOrgImagesRequest {}

message ListOrgImagesResponse {
  repeated OrgImage images = 1;
}

message GetOrgImageRequest {
  // Look up by path (immutable) rather than id.
  string path = 1;
}

message GetOrgImageResponse {
  OrgImage image = 1;
  repeated OrgImageTag tags = 2;
}

message CreateOrgImageRequest {
  string path = 1;
  string description = 2;
}

message TransferOrgImageOwnershipRequest {
  string path = 1;
  OrgImageOwner new_owner = 2;
  OrgImageOwner old_owner = 3;
}

message ListOrgImagePermissionsRequest {
  string path = 1;
}

message ListOrgImagePermissionsResponse {
  repeated OrgImagePermission permissions = 1;
}

message GrantOrgImagePermissionRequest {
  string path = 1;
  OrgImageGranteeType grantee_type = 2;
  string grantee_id = 3;
  optional int32 organization_id = 4;
  OrgImagePermissionLevel permission = 5;
}

message RevokeOrgImagePermissionRequest {
  int64 permission_id = 1;
}

message RevokeOrgImagePermissionResponse {}

message DeleteOrgImageRequest {
  string path = 1;
}

message DeleteOrgImageResponse {}
