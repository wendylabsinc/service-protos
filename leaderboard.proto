syntax = "proto3";

package wendycloud.v1;

import "google/protobuf/timestamp.proto";

service LeaderboardService {
  rpc GetLeaderboard(GetLeaderboardRequest) returns (stream GetLeaderboardResponse);
  rpc AdjustScore(AdjustScoreRequest) returns (ScoreAdjustment);
  rpc ListScoreHistory(ListScoreHistoryRequest) returns (stream ListScoreHistoryResponse);
}

message TeamScore {
  int32 id = 1;
  int32 organization_id = 2;
  int32 team_id = 3;
  string team_name = 4;
  int32 points = 5;
  int32 rank = 6;
}

message ScoreAdjustment {
  int32 id = 1;
  int32 organization_id = 2;
  int32 team_id = 3;
  int32 delta = 4;
  string reason = 5;
  optional string adjusted_by_user_id = 6;
  google.protobuf.Timestamp created_at = 7;
}

message GetLeaderboardRequest {
  int32 organization_id = 1;
}

message GetLeaderboardResponse {
  TeamScore score = 1;
}

message AdjustScoreRequest {
  int32 organization_id = 1;
  int32 team_id = 2;
  int32 delta = 3;
  string reason = 4;
}

message ListScoreHistoryRequest {
  int32 organization_id = 1;
  optional int32 team_id = 2;
}

message ListScoreHistoryResponse {
  ScoreAdjustment adjustment = 1;
}
