syntax = "proto3";
package wendycloud.v1;

import "google/protobuf/timestamp.proto";
import "opentelemetry/proto/metrics/v1/metrics.proto";
import "opentelemetry/proto/trace/v1/trace.proto";

service MetricsTailingService {
  rpc TailMetrics(TailMetricsRequest) returns (stream TailMetricsResponse);
}

service TracesTailingService {
  rpc TailTraces(TailTracesRequest) returns (stream TailTracesResponse);
}

message TailMetricsRequest {
  int32 organization_id = 1;
  int32 asset_id = 2;
  string app_id = 3;
  optional google.protobuf.Timestamp start_time = 4;
  optional int32 poll_interval_seconds = 5;
  optional int32 page_size = 6;
  optional string metric_name_prefix = 7;
}

message TailMetricsResponse {
  repeated opentelemetry.proto.metrics.v1.ResourceMetrics resource_metrics = 1;
  google.protobuf.Timestamp read_through = 2;
}

message TailTracesRequest {
  int32 organization_id = 1;
  int32 asset_id = 2;
  string app_id = 3;
  optional google.protobuf.Timestamp start_time = 4;
  optional int32 poll_interval_seconds = 5;
  optional int32 page_size = 6;
}

message TailTracesResponse {
  repeated opentelemetry.proto.trace.v1.ResourceSpans resource_spans = 1;
  google.protobuf.Timestamp read_through = 2;
}
