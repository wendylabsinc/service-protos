version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    - SERVICE_SUFFIX             # service pkicore.v1.CAEngine (RPC path, cannot rename)
    - RPC_RESPONSE_STANDARD_NAME # streaming AuditLogEntry response
    - ENUM_VALUE_PREFIX          # KeyAlgorithm/AuthMode values = generated Go consts
    - ENUM_ZERO_VALUE_SUFFIX
breaking:
  use:
    - FILE
