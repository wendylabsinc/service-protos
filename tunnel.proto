// TunnelBrokerService brokers mTLS-authenticated TCP tunnels between wendy-agent
// (device) and wendy CLI through the cloud relay.
//
// Authentication: all three RPCs require a valid mTLS client certificate.
//   - Agent RPCs (RegisterPresence, AgentTunnel): asset certificate (org_id + asset_id in SAN)
//   - CLI RPC (ClientTunnel): user certificate (org_id + user_id in SAN)
//
// Session lifecycle:
//   1. CLI sends ClientTunnelOpen (asset_id, host, port) as the first message on a
//      ClientTunnel stream. No session_id exists at this point.
//   2. Broker generates a session_id, parks the ClientTunnel stream, and pushes a
//      DialRequest (session_id, host, port) to the target agent via RegisterPresence.
//   3. Agent dials the local service, opens an AgentTunnel stream, and sends
//      TunnelData{session_id} (empty payload) as its first message to claim the session.
//   4. Broker pairs the two streams by session_id and begins relaying payload data
//      transparently in both directions. session_id is ignored in all subsequent messages.

syntax = "proto3";
package wendycloud.v1;

import "google/protobuf/timestamp.proto";

service TunnelBrokerService {
  // Agent: persistent control stream. Agent sends heartbeats; broker pushes a
  // DialRequest whenever a CLI opens a ClientTunnel targeting this asset.
  rpc RegisterPresence(stream AgentHeartbeat) returns (stream DialRequest);

  // Agent: data stream for one tunnel session. The first message must carry the
  // session_id from the DialRequest (empty payload) so the broker can pair this
  // stream with the waiting ClientTunnel stream. All subsequent messages carry
  // payload data; session_id is ignored after the join.
  rpc AgentTunnel(stream TunnelData) returns (stream TunnelData);

  // CLI: open a tunnel to a device. The first message must be ClientTunnelOpen;
  // the broker assigns a session_id and notifies the target agent via RegisterPresence.
  // Subsequent messages carry payload data relayed to/from the agent.
  rpc ClientTunnel(stream ClientTunnelMessage) returns (stream TunnelData);
}

message AgentHeartbeat {
  // Informational; broker records its own server-side heartbeat time via NOW().
  // Clients may omit this field; it is available for client-side diagnostics only.
  google.protobuf.Timestamp timestamp = 1;
}

message DialRequest {
  // Broker-assigned session identifier. The agent must echo this value in the
  // first TunnelData message on its AgentTunnel stream to claim the session.
  string session_id = 1;
  string host       = 2;
  uint32 port       = 3;
}

message TunnelData {
  // Used only in AgentTunnel's first (join) message: the agent echoes the
  // session_id received in DialRequest so the broker can pair this stream with
  // the waiting ClientTunnel stream. Ignored in all subsequent messages.
  string session_id = 1;
  bytes  payload    = 2;
  bool   half_close = 3;
}

// Sent by the CLI to request a new tunnel connection. The broker generates a
// session_id upon receiving this message and delivers it to the target agent
// as a DialRequest via the agent's RegisterPresence stream.
message ClientTunnelOpen {
  int32  asset_id = 1;
  string host     = 2;
  uint32 port     = 3;
}

// Sent by the CLI on a ClientTunnel stream. The first message must be `open`;
// all subsequent messages must be `data`.
message ClientTunnelMessage {
  oneof content {
    ClientTunnelOpen open = 1;
    TunnelData       data = 2;
  }
}
