// proto/pkicore/v1/types.proto
syntax = "proto3";
package pkicore.v1;
option go_package = "github.com/wendylabsinc/service-protos/pkicore/v1;pkicorev1";

enum KeyAlgorithm {
  KEY_ALGORITHM_UNSPECIFIED = 0;
  ML_DSA_44  = 1;
  ML_DSA_65  = 2;
  ML_DSA_87  = 3;
  ECDSA_P384 = 4;
}

enum AuthMode {
  AUTH_MODE_UNSPECIFIED = 0;
  OPERATOR_PROXIED = 1;
  DEVICE_DIRECT    = 2;
  SERVICE_OIDC     = 3;
  BOOTSTRAP_TOKEN = 4; // device_id + one-time token; engine validates against enrollment_tokens
  DEVICE_CERT     = 5; // existing device cert for re-enrollment; engine looks up cert by serial
  ACME             = 6;
  // 7 and 8 are reserved (previously OIDC_FEDERATION / PLATFORM_SERVICE_MTLS,
  // used by the Plan 22 signing frontend that has since been removed).
  reserved 7, 8;
  reserved "OIDC_FEDERATION", "PLATFORM_SERVICE_MTLS";
}

message Extension {
  string oid      = 1;
  bool   critical = 2;
  bytes  value    = 3;
}

message AuthContext {
  AuthMode mode          = 1;
  bytes    operator_cert = 2; // DER; set when mode=OPERATOR_PROXIED
  string   device_id     = 3;
  string   oidc_token    = 4; // set when mode=SERVICE_OIDC
  string   token        = 5; // plaintext token; set when mode=BOOTSTRAP_TOKEN
  bytes    device_cert  = 6; // DER device cert; set when mode=DEVICE_CERT
  // 7 and 8 are reserved (previously OIDCContext / PlatformServiceContext,
  // used by the Plan 22 signing frontend that has since been removed).
  reserved 7, 8;
  reserved "oidc", "platform_svc";
}

message AuditLogEntry {
  string tenant_id = 1;
  string timestamp = 2; // RFC3339
  string actor     = 3;
  string action    = 4;
  string resource  = 5;
  bytes  details   = 6; // JSON blob
}
