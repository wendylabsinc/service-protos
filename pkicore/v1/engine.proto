// proto/pkicore/v1/engine.proto
syntax = "proto3";
package pkicore.v1;
option go_package = "github.com/wendylabsinc/service-protos/pkicore/v1;pkicorev1";
import "pkicore/v1/types.proto";

service CAEngine {
  rpc IssueCertificate(IssueCertificateRequest)   returns (IssueCertificateResponse);
  rpc RevokeCertificate(RevokeCertificateRequest) returns (RevokeCertificateResponse);
  rpc ListCertificates(ListCertificatesRequest)   returns (ListCertificatesResponse);
  rpc GetCRL(GetCRLRequest)                       returns (GetCRLResponse);
  rpc GetOCSP(GetOCSPRequest)                     returns (GetOCSPResponse);
  rpc CreateCustomerCA(CreateCustomerCARequest)   returns (CreateCustomerCAResponse);
  rpc RotateCA(RotateCARequest)                   returns (RotateCAResponse);
  rpc RevokeCA(RevokeCARequest)                   returns (RevokeCAResponse);
  rpc GetCAChain(GetCAChainRequest)               returns (GetCAChainResponse);
  rpc GetAuditLog(GetAuditLogRequest)             returns (stream AuditLogEntry);
  rpc GetCACerts(GetCACertsRequest)                          returns (GetCACertsResponse);
  rpc VerifyEABSignature(VerifyEABSignatureRequest) returns (VerifyEABSignatureResponse);
  rpc GetCertificate(GetCertificateRequest)         returns (GetCertificateResponse);

  // Admin API RPCs (Plan 16a)
  rpc SetTenantPolicy(SetTenantPolicyRequest)           returns (SetTenantPolicyResponse);
  rpc GetTenantPolicy(GetTenantPolicyRequest)           returns (GetTenantPolicyResponse);
  rpc ListCAs(ListCAsRequest)                           returns (ListCAsResponse);
  rpc OffboardTenant(OffboardTenantRequest)             returns (OffboardTenantResponse);
  rpc CreateEABKey(CreateEABKeyRequest)                 returns (CreateEABKeyResponse);
  rpc ListEABKeys(ListEABKeysRequest)                   returns (ListEABKeysResponse);
  rpc RevokeEABKey(RevokeEABKeyRequest)                 returns (RevokeEABKeyResponse);
  rpc CreateEnrollmentToken(CreateEnrollmentTokenRequest) returns (CreateEnrollmentTokenResponse);
  rpc ListEnrollmentTokens(ListEnrollmentTokensRequest)   returns (ListEnrollmentTokensResponse);
  rpc RevokeEnrollmentToken(RevokeEnrollmentTokenRequest) returns (RevokeEnrollmentTokenResponse);
  rpc IssueOperatorCert(IssueOperatorCertRequest)       returns (IssueOperatorCertResponse);
  // LookupTenant resolves a tenant slug to its authoritative UUID identity.
  // Backs the admin API GET /v1/tenants?slug=<slug> route.
  rpc LookupTenant(LookupTenantRequest)                 returns (LookupTenantResponse);

  // Migration RPC (Plan 23 — PQ modular redesign §4.4).
  rpc MigrateCA(MigrateCARequest) returns (MigrateCAResponse);

  // --- Code-signing RPCs (Phase 4) ---

  // Sign-blob: server-held key signs a pre-computed digest, returns signature + chain.
  // Routed by /v1/sign/blob via the code-signing frontend.
  rpc SignBlob(SignBlobRequest) returns (SignBlobResponse);

  // RFC 3161 timestamp issuance. Routed by /v1/timestamp.
  rpc IssueTimestamp(IssueTimestampRequest) returns (IssueTimestampResponse);

  // CA lifecycle (admin-API):
  rpc BootstrapPlatformCodeSigningRoot(BootstrapPlatformCodeSigningRootRequest)   returns (BootstrapPlatformCodeSigningRootResponse);
  rpc ProvisionPlatformCodeSigningActive(ProvisionPlatformCodeSigningActiveRequest) returns (ProvisionPlatformCodeSigningActiveResponse);
  rpc BootstrapPlatformTSA(BootstrapPlatformTSARequest)                           returns (BootstrapPlatformTSAResponse);
  rpc AttachCodeSigningCA(AttachCodeSigningCARequest)                             returns (AttachCodeSigningCAResponse);

  // Signer lifecycle (admin-API):
  rpc CreateCodeSigningSigner(CreateCodeSigningSignerRequest)                     returns (CreateCodeSigningSignerResponse);
  rpc RetireCodeSigningSigner(RetireCodeSigningSignerRequest)                     returns (RetireCodeSigningSignerResponse);
  rpc ListCodeSigningSigners(ListCodeSigningSignersRequest)                       returns (ListCodeSigningSignersResponse);

  // Tenant rules (admin-API):
  rpc CreateCodeSigningRule(CreateCodeSigningRuleRequest)                         returns (CreateCodeSigningRuleResponse);
  rpc UpdateCodeSigningRule(UpdateCodeSigningRuleRequest)                         returns (UpdateCodeSigningRuleResponse);
  rpc DeleteCodeSigningRule(DeleteCodeSigningRuleRequest)                         returns (DeleteCodeSigningRuleResponse);
  rpc ListCodeSigningRules(ListCodeSigningRulesRequest)                           returns (ListCodeSigningRulesResponse);

  // Durable denial audit: the code-signing frontend rejects most requests
  // before any other RPC fires, so it records those denials via this RPC into
  // the engine's hash-chained audit_log (action "code-sign.deny"), scoped to
  // the resolved tenant.
  rpc RecordCodeSignDenial(RecordCodeSignDenialRequest)                           returns (RecordCodeSignDenialResponse);

  // SSF/CAEP receiver relay (AAA contract §6). The private-only fabric frontend
  // verifies an inbound wendyauth.v1 security-event token (RISC
  // account-disabled / account-purged) against the realm JWKS, then relays the
  // already-verified fact to the key-holding engine over the internal hop via
  // this RPC. The engine idempotently records the disabled principal (keyed on
  // the SET jti) and drives the renewal-refusal gate. Fail-safe / revoke-only:
  // it only ever removes a principal's ability to renew, never grants.
  rpc RecordPrincipalDisable(RecordPrincipalDisableRequest)                       returns (RecordPrincipalDisableResponse);
}

message IssueCertificateRequest {
  string      ca_id             = 1;
  bytes       csr               = 2; // DER PKCS#10
  string      profile           = 3;
  AuthContext auth              = 4;
  repeated Extension extra_extensions = 5;
  // Per-request override of the leaf algorithm (registry name, e.g.
  // "ECDSA_P384" or "ML_DSA_65"). Controls leaf keypair only — must agree
  // with the CSR's SubjectPublicKeyInfo when a CSR is supplied.
  optional string leaf_algorithm = 6;
}

message IssueCertificateResponse {
  bytes certificate = 1; // DER leaf
  bytes chain       = 2; // DER intermediates (not root)
  bytes ocsp_staple = 3; // pre-generated OCSP response for offline carry
}

message RevokeCertificateRequest {
  string ca_id  = 1;
  bytes  serial = 2;
  int32  reason = 3; // RFC 5280 reason code
}
message RevokeCertificateResponse {}

message ListCertificatesRequest {
  string ca_id      = 1;
  string page_token = 2;
  int32  page_size  = 3;
}
message ListCertificatesResponse {
  repeated bytes certificates = 1;
  string         next_page_token = 2;
}

message GetCRLRequest {
  string ca_id = 1;
  bool   delta = 2;
}
message GetCRLResponse {
  bytes  crl         = 1; // DER
  string this_update = 2; // RFC3339
  string next_update = 3; // RFC3339
}

message GetOCSPRequest  { bytes serial = 1; }
message GetOCSPResponse { bytes response = 1; }

message CreateCustomerCARequest {
  string       tenant_id = 1;
  string       label     = 2;
  // Deprecated: superseded by algorithm_name. The legacy enum only covered
  // ML-DSA + ECDSA_P384; new callers should set algorithm_name + backend.
  KeyAlgorithm algorithm = 3 [deprecated = true];
  bytes        policy    = 4; // optional JSON-encoded TenantPolicy; stored atomically
  // Registry algorithm name (e.g. "ECDSA_P384", "ML_DSA_65"). Overrides the
  // tenant default for the intermediate role. Empty falls back to algorithm.
  optional string algorithm_name = 5;
  // Registry backend name (e.g. "software", "cloudkms"). Overrides the
  // tenant default for the intermediate role. Empty falls back to platform
  // default.
  optional string backend = 6;
}
message CreateCustomerCAResponse {
  string intermediate_ca_id = 1;
  string device_ca_id       = 2;
  string operator_ca_id     = 3;
  bytes  intermediate_cert  = 4; // DER
  // Server-minted tenant UUID. The request tenant_id is the caller-supplied
  // slug; the engine mints the authoritative tenant identity and returns it
  // here so the admin API and clients can address the tenant by UUID.
  string tenant_id          = 5;
}

message LookupTenantRequest  { string slug = 1; }
message LookupTenantResponse {
  string tenant_id = 1; // canonical UUID
  string slug      = 2;
  string label     = 3;
  string status    = 4; // "active" | "offboarded"
}

message RotateCARequest  { string ca_id = 1; }
message RotateCAResponse { string new_ca_id = 1; bytes new_cert = 2; }

message RevokeCARequest  { string ca_id = 1; int32 reason = 2; }
message RevokeCAResponse {}

message GetCAChainRequest  { string ca_id = 1; }
message GetCAChainResponse { repeated bytes chain = 1; } // leaf CA → root

message GetAuditLogRequest {
  string tenant_id  = 1;
  string since      = 2; // RFC3339
  string resource   = 3;
  int32  page_size  = 4;
  string page_token = 5;
}

// GetCACerts returns all active CA certificates for the authenticated tenant.
// Tenant is taken from x-tenant-id gRPC metadata. Used by the EST cacerts endpoint.
message GetCACertsRequest {}
message GetCACertsResponse {
  repeated bytes certs = 1; // DER-encoded CA certificates (root → device CA order)
}

message VerifyEABSignatureRequest {
  string tenant_id = 1;
  string key_id    = 2;
  bytes  message   = 3; // base64url(protected) + "." + base64url(payload)
  bytes  mac       = 4; // raw HMAC-SHA256 bytes
}

message VerifyEABSignatureResponse {
  bool   valid                = 1;
  string ca_id                = 2;
  string profile              = 3;
  bool   attestation_required = 4;
  string device_id            = 5;
}

// --- Tenant policy ---

message SetTenantPolicyRequest {
  string tenant_id = 1; // injected from gRPC metadata x-tenant-id
  bytes  policy    = 2; // JSON-encoded store.TenantPolicy
}
message SetTenantPolicyResponse {}

message GetTenantPolicyRequest {
  string tenant_id = 1; // injected from gRPC metadata x-tenant-id
}
message GetTenantPolicyResponse {
  bytes policy = 1; // JSON-encoded store.TenantPolicy; empty if none set
}

// --- CA listing ---

message ListCAsRequest {
  string tenant_id = 1; // injected from gRPC metadata x-tenant-id
}
message CAInfo {
  string ca_id       = 1;
  string label       = 2;
  string status      = 3;  // "active" | "revoked"
  string not_after   = 4;  // RFC3339
  bytes  certificate = 5; // DER
}
message ListCAsResponse {
  repeated CAInfo cas = 1;
}

// --- Offboarding ---

message OffboardTenantRequest {
  string tenant_id = 1; // injected from gRPC metadata x-tenant-id
}
message OffboardTenantResponse {}

// --- EAB key management ---

message CreateEABKeyRequest {
  string tenant_id            = 1; // injected from gRPC metadata x-tenant-id
  string ca_id                = 2;
  string device_id            = 3;
  string profile              = 4;
  bool   attestation_required = 5;
}
message CreateEABKeyResponse {
  string key_id   = 1;
  string hmac_key = 2; // hex-encoded raw HMAC key (returned once only)
}

message ListEABKeysRequest {
  string tenant_id     = 1; // injected from gRPC metadata x-tenant-id
  int32  page_size     = 2;
  string page_token    = 3; // UUID of last key from previous page
  string status_filter = 4; // "active" | "consumed" | "revoked" | "" (all)
}
message EABKeyInfo {
  string key_id                = 1;
  string ca_id                 = 2;
  string device_id             = 3;
  string profile               = 4;
  bool   attestation_required  = 5;
  string status                = 6;
  string created_at            = 7; // RFC3339
}
message ListEABKeysResponse {
  repeated EABKeyInfo keys            = 1;
  string              next_page_token = 2;
}

message RevokeEABKeyRequest {
  string tenant_id = 1; // injected from gRPC metadata x-tenant-id
  string key_id    = 2;
}
message RevokeEABKeyResponse {}

// --- Enrollment token management ---

message CreateEnrollmentTokenRequest {
  string tenant_id   = 1; // injected from gRPC metadata x-tenant-id
  string ca_id       = 2;
  string device_id   = 3;
  string profile     = 4;
  int64  ttl_seconds = 5;
}
message CreateEnrollmentTokenResponse {
  string token_id    = 1;
  string token_value = 2; // plaintext token (returned once only)
  string expires_at  = 3; // RFC3339
}

message ListEnrollmentTokensRequest {
  string tenant_id     = 1; // injected from gRPC metadata x-tenant-id
  int32  page_size     = 2;
  string page_token    = 3; // UUID of last token from previous page
  bool   show_consumed = 4; // if false (default) show only unused non-revoked tokens
}
message EnrollmentTokenInfo {
  string token_id   = 1;
  string device_id  = 2;
  string profile    = 3;
  string expires_at = 4; // RFC3339
  bool   consumed   = 5;
  string created_at = 6; // RFC3339
}
message ListEnrollmentTokensResponse {
  repeated EnrollmentTokenInfo tokens         = 1;
  string                       next_page_token = 2;
}

message RevokeEnrollmentTokenRequest {
  string tenant_id = 1; // injected from gRPC metadata x-tenant-id
  string token_id  = 2;
}
message RevokeEnrollmentTokenResponse {}

// --- Operator cert issuance ---

message IssueOperatorCertRequest {
  string          tenant_id     = 1; // injected from gRPC metadata x-tenant-id
  string          subject_cn    = 2;
  string          subject_email = 3;
  repeated string entitlements  = 4;
  int64           ttl_seconds   = 5;
  bool            field_mode    = 6;
  bytes           csr           = 7; // optional DER PKCS#10; if empty engine generates keypair
  string          operator_id   = 8; // authoritative per-operator identity; SPIFFE path segment; renewal-safe (not uniqueness-enforced)
  string          spiffe_kind   = 9; // "operator" (default/empty) or "service"; server-selected SPIFFE kind
}
message IssueOperatorCertResponse {
  bytes certificate = 1; // DER leaf
  bytes chain       = 2; // DER intermediates
  reserved 3;            // W12: was private_key; server never returns a key
  reserved "private_key";
  bytes ocsp_staple = 4;
}

message GetCertificateRequest  { bytes serial = 1; }
message GetCertificateResponse { bytes certificate = 1; } // DER leaf

// --- Migration (Plan 23 §4.4) ---

// MigrateCA creates a successor CA under a new (algorithm, backend) pair.
// The successor CA is signed by the same parent (or self-signs for roots);
// the predecessor CA is left active for issuance until its TTL elapses, at
// which point an external reaper revokes it. Both algorithm and backend are
// required — empty values are rejected.
message MigrateCARequest {
  string ca_id     = 1;
  string algorithm = 2; // registry name, required
  string backend   = 3; // registry name, required
}

message MigrateCAResponse {
  string successor_ca_id = 1;
  bytes  certificate     = 2; // DER of the successor CA
}

// --- Code-signing messages (Phase 4) ---

message SignBlobRequest {
  string tenant_id          = 1; // "system" for platform signers
  string signer_id          = 2; // UUID of code_signing_signers row
  bytes  digest             = 3; // hex-decoded bytes
  string digest_alg         = 4; // "sha256" | "sha384" | "sha512"
  bool   request_timestamp  = 5;
  string request_id         = 6; // server-generated UUID for correlation
}
message SignBlobResponse {
  bytes  signature       = 1;
  string signature_alg   = 2; // e.g. "ECDSA_P256_SHA256", "ML_DSA_65"
  bytes  signer_cert     = 3; // DER
  repeated bytes chain   = 4; // DER intermediates (parent CA → next-up; root excluded)
  bytes  timestamp_token = 5; // optional, DER RFC 3161 TimeStampResp; empty if not requested
}

message IssueTimestampRequest {
  bytes  tsr_request = 1; // DER RFC 3161 TimeStampReq
  string tenant_id   = 2; // for audit; "system" for platform signers
  string request_id  = 3;
}
message IssueTimestampResponse {
  bytes tsr_response = 1; // DER RFC 3161 TimeStampResp
}

message BootstrapPlatformCodeSigningRootRequest {
  string label              = 1;
  string algorithm          = 2; // ML-DSA only
  string key_manager_name   = 3;
  int32  validity_years     = 4;
  bool   force              = 5;
}
message BootstrapPlatformCodeSigningRootResponse {
  string root_ca_id = 1;
  bytes  certificate = 2; // DER
}

message ProvisionPlatformCodeSigningActiveRequest {
  string root_ca_id        = 1;
  string algorithm         = 2; // Plan-23 algorithm name
  string backend           = 3; // "software" | "pkcs11" | "cloudkms"
  int32  validity_years    = 4;
}
message ProvisionPlatformCodeSigningActiveResponse {
  string active_ca_id = 1;
  bytes  certificate  = 2;
}

message BootstrapPlatformTSARequest {
  string root_label           = 1;
  string root_algorithm       = 2; // ML-DSA only
  string root_key_manager     = 3;
  int32  root_validity_years  = 4;

  string signer_algorithm     = 5; // defaults to ECDSA_P256
  string signer_key_manager   = 6;
  int32  signer_validity_years= 7;

  bool   force                = 8;
}
message BootstrapPlatformTSAResponse {
  string root_ca_id        = 1;
  bytes  root_certificate  = 2;
  bytes  signer_certificate = 3;
  string signer_algorithm  = 4;
}

message AttachCodeSigningCARequest {
  string tenant_id  = 1;
  string algorithm  = 2; // Plan-23 algorithm name
  string backend    = 3; // "software" | "pkcs11" | "cloudkms"
}
message AttachCodeSigningCAResponse {
  string ca_id              = 1;
  bytes  certificate        = 2; // DER
  string default_signer_id  = 3;
  bytes  default_signer_cert = 4; // DER
}

message CreateCodeSigningSignerRequest {
  string tenant_id = 1;
  string ca_id     = 2;
  string label     = 3;
  string algorithm = 4;
  string backend   = 5;
  string purpose   = 6; // "app" | "image" | "ota"
}
message CreateCodeSigningSignerResponse {
  string signer_id    = 1;
  bytes  certificate  = 2; // DER leaf
  string algorithm    = 3; // resolved
}

message RetireCodeSigningSignerRequest {
  string tenant_id  = 1;
  string signer_id  = 2;
}
message RetireCodeSigningSignerResponse {}

message ListCodeSigningSignersRequest {
  string tenant_id     = 1;
  string status_filter = 2; // "" | "active" | "retired"
}
message CodeSigningSignerInfo {
  string signer_id   = 1;
  string label       = 2;
  string ca_id       = 3;
  string algorithm   = 4;
  string status      = 5;
  string created_at  = 6; // RFC3339
  bytes  certificate = 7; // DER
}
message ListCodeSigningSignersResponse {
  repeated CodeSigningSignerInfo signers = 1;
}

message CreateCodeSigningRuleRequest {
  string tenant_id            = 1;
  string label                = 2;
  string issuer               = 3;
  string repository           = 4;
  string ref_pattern          = 5;
  string job_workflow_pattern = 6;
  string target_ca_id         = 7;
  string signer_id            = 8; // empty = use default signer
  repeated string allowed_endpoints = 9; // subset of {"sign_blob","sign_cert","timestamp"}
  int32  max_ttl_seconds      = 10;
  string purpose              = 11; // "app" | "image" | "ota" (tenant rules must be "app")
}
message CreateCodeSigningRuleResponse {
  string rule_id = 1;
}

message UpdateCodeSigningRuleRequest {
  string rule_id              = 1;
  string tenant_id            = 2;

  // Mutable fields. Empty/zero => "no change" for that field.
  string label                = 3;
  string issuer               = 4;
  string repository           = 5;
  string ref_pattern          = 6;
  string job_workflow_pattern = 7;
  string target_ca_id         = 8;
  string signer_id            = 9;
  repeated string allowed_endpoints = 10;
  int32  max_ttl_seconds      = 11;
  string purpose              = 12;
}
message UpdateCodeSigningRuleResponse {}

message DeleteCodeSigningRuleRequest {
  string tenant_id = 1;
  string rule_id   = 2;
}
message DeleteCodeSigningRuleResponse {}

message ListCodeSigningRulesRequest {
  string tenant_id = 1;
}
message CodeSigningRuleInfo {
  string rule_id              = 1;
  string label                = 2;
  string issuer               = 3;
  string repository           = 4;
  string ref_pattern          = 5;
  string job_workflow_pattern = 6;
  string target_ca_id         = 7;
  string signer_id            = 8;
  repeated string allowed_endpoints = 9;
  int32  max_ttl_seconds      = 10;
  string purpose              = 11;
  string created_at           = 12; // RFC3339
  string updated_at           = 13; // RFC3339
}
message ListCodeSigningRulesResponse {
  repeated CodeSigningRuleInfo rules = 1;
}

message RecordCodeSignDenialRequest {
  string tenant_id  = 1; // resolved tenant ("system" for platform/Flow 1)
  // actor is a CLIENT-CLAIMED principal hint and is NOT authoritative (A9).
  // The engine records it under audit details.claimed_actor; the authoritative
  // audit `actor` column is always the verified mTLS channel identity.
  string actor      = 2;
  string code       = 3; // stable denial code, e.g. "RULE_NOT_MATCHED"
  string request_id = 4;
  string endpoint   = 5; // "sign_blob" | "sign_cert" | "timestamp"
}
message RecordCodeSignDenialResponse {}

// RecordPrincipalDisableRequest carries the fact extracted from a verified
// wendyauth.v1 security-event token by the fabric frontend. The token itself
// (the raw SET) is NEVER relayed to the engine — only this extracted fact — and
// is never persisted or logged (secret-free).
message RecordPrincipalDisableRequest {
  string tenant_id     = 1; // injected from gRPC metadata x-tenant-id
  string principal_uri = 2; // SPIFFE URI of the disabled principal (authority: from the verified SET sub_id)
  string event_type    = 3; // RISC short form: "account-disabled" | "account-purged"
  string source_jti    = 4; // the SET jti — idempotency key for the replay cache
  int64  set_exp_unix  = 5; // the SET exp (unix seconds) — bounds the replay-cache row TTL
}
message RecordPrincipalDisableResponse {}
