syntax = "proto3";

package wendycloud.v1;

service PublicRoutingService {
  rpc GetOrgPublicRouting(GetOrgPublicRoutingRequest) returns (OrgPublicRouting);
  rpc SetOrgPublicRouting(SetOrgPublicRoutingRequest) returns (OrgPublicRouting);
  rpc GetDevicePublicRouting(GetDevicePublicRoutingRequest) returns (DevicePublicRouting);
  rpc SetDevicePublicRouting(SetDevicePublicRoutingRequest) returns (DevicePublicRouting);
}

message OrgPublicRouting {
  int32 organization_id = 1;
  string slug = 2;
  bool enabled = 3;
  repeated int32 port_denylist = 4;
}

message GetOrgPublicRoutingRequest {
  int32 organization_id = 1;
}

message SetOrgPublicRoutingRequest {
  int32 organization_id = 1;
  optional bool enabled = 2;
  // When set, replaces the org port denylist wholesale.
  repeated int32 port_denylist = 3;
  bool update_port_denylist = 4;  // set true to apply port_denylist (even if empty)
}

message DevicePublicRouting {
  int32 asset_id = 1;
  int32 organization_id = 2;
  bool enabled = 3;
  optional string hostname_label = 4;
  repeated int32 port_denylist = 5;
  optional string ipv6 = 6;
  // Fully-qualified public hostname, present only when enabled and label+slug exist.
  optional string public_url = 7;
  // Customer-owned FQDN pointed at ipv6 via their own AAAA record. Display only.
  optional string custom_domain = 8;
}

message GetDevicePublicRoutingRequest {
  int32 asset_id = 1;
}

message SetDevicePublicRoutingRequest {
  int32 asset_id = 1;
  optional bool enabled = 2;
  optional string hostname_label = 3;
  repeated int32 port_denylist = 4;
  bool update_port_denylist = 5;  // set true to apply port_denylist (even if empty)
  // Set custom_domain (empty string clears it; requires update_custom_domain=true).
  optional string custom_domain = 6;
  bool update_custom_domain = 7;
}
