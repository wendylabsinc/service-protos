syntax = "proto3";

package wendycloud.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ScheduleService {
  rpc CreateSlot(CreateSlotRequest) returns (Slot);
  rpc GetSlot(GetSlotRequest) returns (Slot);
  rpc UpdateSlot(UpdateSlotRequest) returns (Slot);
  rpc DeleteSlot(DeleteSlotRequest) returns (google.protobuf.Empty);
  rpc ListSlots(ListSlotsRequest) returns (stream ListSlotsResponse);
  rpc GetActiveSlot(GetActiveSlotRequest) returns (GetActiveSlotResponse);
  rpc ForceEndSlot(ForceEndSlotRequest) returns (Slot);
}

message Slot {
  int32 id = 1;
  int32 organization_id = 2;
  int32 team_id = 3;
  int32 asset_id = 4;
  google.protobuf.Timestamp starts_at = 5;
  google.protobuf.Timestamp ends_at = 6;
  string status = 7;
  optional string created_by_user_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateSlotRequest {
  int32 organization_id = 1;
  int32 team_id = 2;
  int32 asset_id = 3;
  google.protobuf.Timestamp starts_at = 4;
  google.protobuf.Timestamp ends_at = 5;
}

message GetSlotRequest {
  int32 id = 1;
  int32 organization_id = 2;
}

message UpdateSlotRequest {
  int32 id = 1;
  int32 organization_id = 2;
  optional google.protobuf.Timestamp starts_at = 3;
  optional google.protobuf.Timestamp ends_at = 4;
}

message DeleteSlotRequest {
  int32 id = 1;
  int32 organization_id = 2;
}

message ListSlotsRequest {
  int32 organization_id = 1;
  optional int32 asset_id = 2;
  optional int32 team_id = 3;
}

message ListSlotsResponse {
  Slot slot = 1;
}

message GetActiveSlotRequest {
  int32 asset_id = 1;
  int32 organization_id = 2;
}

message GetActiveSlotResponse {
  optional Slot slot = 1;
}

message ForceEndSlotRequest {
  int32 id = 1;
  int32 organization_id = 2;
}

message TeamQuota {
  int32 id = 1;
  int32 organization_id = 2;
  int32 team_id = 3;
  int32 quota_minutes = 4;
  int32 used_minutes = 5;
}
