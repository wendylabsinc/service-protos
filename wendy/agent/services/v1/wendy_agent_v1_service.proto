syntax = "proto3";

package wendy.agent.services.v1;

option go_package = "github.com/wendylabsinc/cloud/services/internal/proto";

import "wendy/agent/services/v1/shared.proto";

service WendyAgentService {
    // Upload a container image to the agent, and run it.
    // The first message in the stream MUST be the header.
    rpc RunContainer(stream RunContainerRequest) returns (stream RunContainerResponse);

    rpc UpdateAgent(stream UpdateAgentRequest) returns (stream UpdateAgentResponse);

    rpc GetAgentVersion(GetAgentVersionRequest) returns (GetAgentVersionResponse);

    // List available WiFi networks
    rpc ListWiFiNetworks(ListWiFiNetworksRequest) returns (ListWiFiNetworksResponse);

    // Connect to a specific WiFi network
    rpc ConnectToWiFi(ConnectToWiFiRequest) returns (ConnectToWiFiResponse);

    // Get the current WiFi connection status
    rpc GetWiFiStatus(GetWiFiStatusRequest) returns (GetWiFiStatusResponse);

    // Disconnect from the current WiFi network
    rpc DisconnectWiFi(DisconnectWiFiRequest) returns (DisconnectWiFiResponse);

    // List only the WiFi networks that have a saved profile on the device.
    rpc ListKnownWiFiNetworks(ListKnownWiFiNetworksRequest) returns (ListKnownWiFiNetworksResponse);

    // Set the autoconnect priority (rank) of a single known network.
    rpc SetWiFiNetworkPriority(SetWiFiNetworkPriorityRequest) returns (SetWiFiNetworkPriorityResponse);

    // Bulk-reorder known networks by SSID. Earlier SSIDs get higher priority.
    rpc ReorderKnownWiFiNetworks(ReorderKnownWiFiNetworksRequest) returns (ReorderKnownWiFiNetworksResponse);

    // Remove a known network (NetworkManager profile) from the device.
    rpc ForgetWiFiNetwork(ForgetWiFiNetworkRequest) returns (ForgetWiFiNetworkResponse);

    // List available hardware capabilities on the device
    rpc ListHardwareCapabilities(ListHardwareCapabilitiesRequest) returns (ListHardwareCapabilitiesResponse);

    rpc ScanBluetoothPeripherals(stream ScanBluetoothPeripheralsRequest) returns (stream ScanBluetoothPeripheralsResponse);

    rpc ConnectBluetoothPeripheral(ConnectBluetoothPeripheralRequest) returns (ConnectBluetoothPeripheralResponse);
    rpc DisconnectBluetoothPeripheral(DisconnectBluetoothPeripheralRequest) returns (DisconnectBluetoothPeripheralResponse);
    rpc ForgetBluetoothPeripheral(ForgetBluetoothPeripheralRequest) returns (ForgetBluetoothPeripheralResponse);

    // Update the operating system using a Mender artifact
    rpc UpdateOS(UpdateOSRequest) returns (stream UpdateOSResponse);
}

message RunContainerRequest {
    oneof request_type {
        // The first message in the stream MUST be the header.
        Header header = 1;

        // A chunk of the container tarball.
        Chunk chunk = 2;

        // After uploading the container, control messages can be sent to the agent.
        ControlCommand control = 3;
    }

    message Header {
        // Unique name for the container image
        string image_name = 1;

        // The command to run when the container starts.
        string cmd = 2;

        // The app config for the container.
        bytes app_config = 3;
    }

    message Chunk {
        // Binary chunk of the container tarball
        bytes data = 1;
    }
}

message ControlCommand {
    oneof command {
        Run run = 1;
        Stop stop = 2;
    }

    message Run {
        // Whether to run the container with a debugger
        bool debug = 1;

        // Optional restart policy override for Docker runtime.
        optional RestartPolicy restart_policy = 2;
    }

    message Stop {
        // No fields needed; acts on the current container in this stream
    }
}

message RunContainerResponse {
    oneof response_type {
        Started started = 1;
        Stopped stopped = 2;
        ConsoleOutput stdout_output = 3;
        ConsoleOutput stderr_output = 4;
    }

    message Started {
        // The port that the debugger is listening on.
        // If this is 0, the container is not running with a debugger.
        uint32 debug_port = 1;
    }

    message Stopped {
        // No fields; indicates container has been stopped
    }

    message ConsoleOutput {
        // Output data from the container
        bytes data = 1;
    }
}

message UpdateAgentRequest {
    oneof request_type {
        Chunk chunk = 1;
        ControlCommand control = 2;
    }

    message Chunk {
        bytes data = 1;
    }

    message ControlCommand {
        oneof command {
            // Triggers the replacement of the running agent with the new binary.
            Update update = 1;
        }

        message Update {
            string sha256 = 1;
        }
    }
}

message UpdateAgentResponse {
    oneof response_type {
        Updated updated = 1;
    }

    message Updated {

    }
}

message GetAgentVersionRequest {

}

message GetAgentVersionResponse {
    string version = 1;
    // OS version read from /etc/wendy/version.txt (only present on WendyOS)
    optional string os_version = 2;
    string os = 3;
    string cpu_architecture = 4;
    optional string public_key = 5;
    repeated string featureset = 6;
    // MACHINE/BOARD value from /etc/wendyos/device-type (only present on WendyOS)
    optional string device_type = 7;
    // Whether the device has a GPU.
    optional bool has_gpu = 8;
    // GPU vendor identifier (e.g. "nvidia"). Only present when has_gpu is true.
    optional string gpu_vendor = 9;
    // JetPack version (e.g. "6.2"). Only present on NVIDIA Jetson devices.
    optional string jetpack_version = 10;
    // CUDA version string (e.g. "12.2.0"). Only present when CUDA is installed.
    optional string cuda_version = 11;
    // STORAGE value from /etc/wendyos/device-type (e.g. "sd", "nvme"). Only present on WendyOS.
    optional string storage_medium = 12;
}

// Request message for listing WiFi networks
message ListWiFiNetworksRequest {
    // Empty request - no parameters needed
}

// Security type advertised by or used for a WiFi network.
enum WiFiSecurityType {
    WIFI_SECURITY_TYPE_UNSPECIFIED = 0;
    WIFI_SECURITY_TYPE_OPEN = 1;
    WIFI_SECURITY_TYPE_WEP = 2;
    WIFI_SECURITY_TYPE_WPA_PSK = 3;
    WIFI_SECURITY_TYPE_WPA2_PSK = 4;
    WIFI_SECURITY_TYPE_WPA3_SAE = 5;
    WIFI_SECURITY_TYPE_WPA2_ENTERPRISE = 6;
}

// Response message for listing WiFi networks
message ListWiFiNetworksResponse {
    // List of available WiFi networks
    repeated WiFiNetwork networks = 1;

    // Information about a WiFi network
    message WiFiNetwork {
        // SSID (name) of the WiFi network
        string ssid = 1;

        // Signal strength indicator (0-100, if available)
        optional int32 signal_strength = 2;

        // Best-effort security type detected from the scan / saved profile.
        WiFiSecurityType security = 3;

        // True if the device already has a saved connection profile for this SSID.
        bool is_known = 4;

        // True if this network is currently the active/connected WiFi network.
        bool is_connected = 5;

        // Autoconnect priority for the stored profile. Unset if not a known network.
        // NetworkManager uses higher integers as higher priority; lower == tie-break
        // by most-recently-used. We echo NM's raw value here.
        optional int32 priority = 6;

        // Raw RSSI in dBm if available from the scanner.
        optional int32 rssi_dbm = 7;
    }
}

// Request message for connecting to a WiFi network
message ConnectToWiFiRequest {
    // SSID (name) of the WiFi network to connect to
    string ssid = 1;

    // Password for the WiFi network
    string password = 2;

    // Security type hint - used when connecting to unlisted (hidden) networks
    // where autodetection is not possible.
    optional WiFiSecurityType security = 3;

    // When true, treat the SSID as hidden / non-broadcasting.
    optional bool hidden = 4;
}

// Response message for connecting to a WiFi network
message ConnectToWiFiResponse {
    // Whether the connection was successful
    bool success = 1;

    // Optional error message if connection failed
    optional string error_message = 2;
}

// Request message for getting WiFi status
message GetWiFiStatusRequest {
    // Empty request - no parameters needed
}

// Response message for getting WiFi status
message GetWiFiStatusResponse {
    // Whether the device is currently connected to a WiFi network
    bool connected = 1;

    // SSID of the connected network (only present if connected is true)
    optional string ssid = 2;

    // Optional error message if status check failed
    optional string error_message = 3;
}

// Request message for disconnecting from WiFi
message DisconnectWiFiRequest {
    // Empty request - no parameters needed
}

// Response message for disconnecting from WiFi
message DisconnectWiFiResponse {
    // Whether the disconnection was successful
    bool success = 1;

    // Optional error message if disconnection failed
    optional string error_message = 2;
}

// Request message for listing known (saved) WiFi networks.
message ListKnownWiFiNetworksRequest {}

// Response message for listing known (saved) WiFi networks.
message ListKnownWiFiNetworksResponse {
    repeated KnownWiFiNetwork networks = 1;

    message KnownWiFiNetwork {
        // SSID (name) of the saved WiFi network.
        string ssid = 1;

        // NetworkManager connection UUID (agent-internal identifier).
        string uuid = 2;

        // Autoconnect priority. Higher = prefer to auto-connect first.
        int32 priority = 3;

        // Best-effort security type of the saved profile.
        WiFiSecurityType security = 4;
    }
}

// Request to set the priority of a single saved network.
message SetWiFiNetworkPriorityRequest {
    // SSID of the saved network.
    string ssid = 1;

    // New autoconnect priority value.
    int32 priority = 2;
}

message SetWiFiNetworkPriorityResponse {
    bool success = 1;
    optional string error_message = 2;
}

// Request to bulk-reorder saved networks. The first SSID in `order_ssids`
// gets the highest priority, the last gets the lowest. SSIDs not listed
// are left untouched.
message ReorderKnownWiFiNetworksRequest {
    repeated string order_ssids = 1;
}

message ReorderKnownWiFiNetworksResponse {
    bool success = 1;
    optional string error_message = 2;
}

// Request to remove a saved network profile.
message ForgetWiFiNetworkRequest {
    string ssid = 1;
}

message ForgetWiFiNetworkResponse {
    bool success = 1;
    optional string error_message = 2;
}

// Request message for listing hardware capabilities
message ListHardwareCapabilitiesRequest {
    // Optional filter by hardware category (e.g., "gpu", "usb", "i2c")
    optional string category_filter = 1;
}

// Response message for listing hardware capabilities
message ListHardwareCapabilitiesResponse {
    // List of available hardware capabilities
    repeated HardwareCapability capabilities = 1;

    // Information about a hardware capability
    message HardwareCapability {
        // Category of hardware (e.g., "gpu", "usb", "i2c", "gpio", "camera")
        string category = 1;

        // Device path (e.g., "/dev/video0", "/dev/i2c-1")
        string device_path = 2;

        // Human-readable description
        string description = 3;

        // Additional properties as key-value pairs
        map<string, string> properties = 4;
    }
}

message ScanBluetoothPeripheralsRequest {}

message DiscoveredBluetoothPeripheral {
    string name = 1;
    string address = 2;
    int32 rssi = 3;
    string deviceType = 4;
    bool paired = 5;
    bool connected = 6;
    bool trusted = 7;
}

message ScanBluetoothPeripheralsResponse {
    repeated DiscoveredBluetoothPeripheral discovered_devices = 1;
}

message ConnectBluetoothPeripheralRequest {
    string address = 1;
    bool pair = 2;
    bool trust = 3;
}
message ConnectBluetoothPeripheralResponse {}

message DisconnectBluetoothPeripheralRequest {
    string address = 1;
}
message DisconnectBluetoothPeripheralResponse {}

message ForgetBluetoothPeripheralRequest {
    string address = 1;
}
message ForgetBluetoothPeripheralResponse {}

// Request message for updating the OS
message UpdateOSRequest {
    // URL to download the Mender artifact from
    string artifact_url = 1;
}

// Response message for OS update progress
message UpdateOSResponse {
    oneof response_type {
        Progress progress = 1;
        Completed completed = 2;
        Failed failed = 3;
    }

    message Progress {
        // Current phase of the update (downloading, installing, etc.)
        string phase = 1;
        // Progress percentage (0-100)
        int32 percent = 2;
    }

    message Completed {
        // Whether a reboot is required to complete the update
        bool reboot_required = 1;
    }

    message Failed {
        // Error message describing the failure
        string error_message = 1;
    }
}
