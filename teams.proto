syntax = "proto3";

package wendycloud.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service TeamService {
  rpc CreateTeam(CreateTeamRequest) returns (Team);
  rpc GetTeam(GetTeamRequest) returns (Team);
  rpc UpdateTeam(UpdateTeamRequest) returns (Team);
  rpc DeleteTeam(DeleteTeamRequest) returns (google.protobuf.Empty);
  rpc ListTeams(ListTeamsRequest) returns (stream ListTeamsResponse);
  rpc AddTeamMember(AddTeamMemberRequest) returns (TeamMember);
  rpc RemoveTeamMember(RemoveTeamMemberRequest) returns (google.protobuf.Empty);
  rpc ListTeamMembers(ListTeamMembersRequest) returns (stream ListTeamMembersResponse);
}

message Team {
  int32 id = 1;
  int32 organization_id = 2;
  string name = 3;
  optional string description = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message TeamMember {
  int32 id = 1;
  int32 team_id = 2;
  string user_id = 3;
  google.protobuf.Timestamp created_at = 4;
}

message CreateTeamRequest {
  int32 organization_id = 1;
  string name = 2;
  optional string description = 3;
}

message GetTeamRequest {
  int32 id = 1;
  int32 organization_id = 2;
}

message UpdateTeamRequest {
  int32 id = 1;
  int32 organization_id = 2;
  optional string name = 3;
  optional string description = 4;
}

message DeleteTeamRequest {
  int32 id = 1;
  int32 organization_id = 2;
}

message ListTeamsRequest {
  int32 organization_id = 1;
}

message ListTeamsResponse {
  Team team = 1;
}

message AddTeamMemberRequest {
  int32 team_id = 1;
  int32 organization_id = 2;
  string user_id = 3;
}

message RemoveTeamMemberRequest {
  int32 team_id = 1;
  int32 organization_id = 2;
  string user_id = 3;
}

message ListTeamMembersRequest {
  int32 team_id = 1;
  int32 organization_id = 2;
}

message ListTeamMembersResponse {
  TeamMember member = 1;
}
